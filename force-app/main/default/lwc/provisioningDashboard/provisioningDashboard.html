<template>
    <div class="dashboard-main-container">
        
        <div class="filter-row-container">
            <lightning-combobox 
                name="dateFilter" 
                value={selectedFilter}
                options={filterOptions} 
                onchange={handleFilterChange}
                variant="label-hidden" 
                class="dashboard-top-dropdown">
            </lightning-combobox>

            <template if:true={isCustomDate}>
                <div class="custom-range-inline">
                    <lightning-input type="date" value={startDate} onchange={handleStartDateChange} variant="label-hidden" class="slds-m-right_x-small"></lightning-input>
                    <lightning-input type="date" value={endDate} onchange={handleEndDateChange} variant="label-hidden"></lightning-input>
                </div>
            </template>
        </div>

        <div class="dashboard-grid">
            
            <div class="dashboard-card-dark">
                <template if:false={globalError}>
                    <div class="card-title">Provisioning Completed</div>
                    <div class="card-subtitle-lbl">(Computed MRC)</div>
                    <div class="card-value">{card1_formattedMrc}</div>
                    
                    <div class="trend-stack-container">
                        <div class={card1_trendClass}>
                            <template if:false={card1_isZero}>
                                <span class="trend-arrow">{card1_trendIcon}</span>
                            </template>
                            <span class="trend-percentage">{card1_percentageGrowth}</span>
                        </div>
                        <div class="trend-period-text">{timeframeText}</div>
                    </div>
                </template>

                <template if:true={globalError}>
                    <div class="error-state-dark">Failed to load Provisioning Completed metrics data.</div>
                </template>
            </div>

            <div class="dashboard-card-dark">
                <template if:false={globalError}>
                    <div class="card-title">Approval Growth %</div>
                    <div class="card-subtitle-lbl">&nbsp;</div> 
                    <div class="card-value">{card2_MainValue}</div>
                    
                    <div class="trend-stack-container">
                        <div class={card2_trendClass}>
                            <template if:false={card2_isZero}>
                                <span class="trend-arrow">{card2_trendIcon}</span>
                            </template>
                            <span class="trend-percentage">{card2_percentageGrowth}</span>
                        </div>
                        <div class="trend-period-text">{timeframeText}</div>
                    </div>
                </template>

                <template if:true={globalError}>
                    <div class="error-state-dark">Failed to load Approval Growth data.</div>
                </template>
            </div>

            <div class="dashboard-card-dark">
                <template if:false={ProvisioningCompletedcard3Error}>
                    
                    <div class="card-section top-section">
                        <div class="card-title">Provisioning Completed</div>
                        <div class="card-value">{provisioningCompletedValue}</div>
                        
                        <div class="trend-stack-container">
                            <div class={card3_countTrendClass}>
                                <template if:false={card3_countIsZero}>
                                    <span class="trend-arrow">{card3_countTrendIcon}</span>
                                </template>
                                <span class="trend-percentage">{provisioningTrend}</span>
                            </div>
                            <div class="trend-period-text">{timeframeText}</div>
                        </div>
                    </div>

                    <hr class="card-divider" />

                    <div class="card-section bottom-section">
                        <div class="card-title">Net MRC</div>
                        <div class="card-value">{ProvisioningCompletedMRC}</div>
                        
                        <div class="trend-stack-container">
                            <div class={card3_mrcTrendClass}>
                                <template if:false={card3_mrcIsZero}>
                                    <span class="trend-arrow">{card3_mrcTrendIcon}</span>
                                </template>
                                <span class="trend-percentage">{netMrcTrend} {percentageMrcTrend}</span>
                            </div>
                            <div class="trend-period-text">{timeframeText}</div>
                        </div>
                    </div>
                </template>

                <template if:true={ProvisioningCompletedcard3Error}>
                    <div class="error-state-dark">Failed to load Card 3 Provisioning metrics.</div>
                </template>
            </div>

            <div class="dashboard-card-dark">
                <template if:false={ProvisioningCompletedGrowthcard4Error}>

                    <div class="card-title">Provisioning Completed Growth (%)</div>
                    <div class="card-subtitle-lbl">&nbsp;</div>
                    
                    <div class="card-value">{ProvisioningCompletedGrowthPercent}</div>
                    
                    <div class="trend-stack-container">
                        <div class={card4_trendClass}>
                            <template if:false={card4_isZero}>
                                <span class="trend-arrow">{card4_trendIcon}</span>
                            </template>
                            <span class="trend-percentage">{ProvisioningCompletedGrowthTrend}</span>
                        </div>
                        <div class="trend-period-text">{timeframeText}</div>
                    </div>
                </template>
                
                <template if:true={ProvisioningCompletedGrowthcard4Error}>
                    <div class="error-state-dark">Failed to load Provisioning Completed Growth data.</div>
                </template>
            </div>

            <div class="dashboard-card-dark">
                <template if:false={WorkInProgresscardError}>

                    <div class="card-title">Work In Progress</div>
                    <div class="card-subtitle-lbl">(MRC)</div>
                    
                    <div class="card-value">{card5_wipMrcValue}</div>
                    
                    <div class="trend-stack-container">
                        <div class={card5_trendClass}>
                            <template if:false={card5_isZero}>
                                <span class="trend-arrow">{card5_trendIcon}</span>
                            </template>
                            <span class="trend-percentage">{card5_wipPercentage}</span>
                        </div>
                    </div>
                </template>
                
                <template if:true={WorkInProgresscardError}>
                    <div class="error-state-dark">Failed to load Work In Progress metrics data.</div>
                </template>
            </div>

            <div class="dashboard-card-dark">
                <template if:false={ProvisioningBacklogscard5Error}>

                    <div class="card-title">Provisioning Backlogs (%)</div>
                    <div class="card-subtitle-lbl">&nbsp;</div>
                    
                    <div class="card-value">{ProvisioningBacklogsPercent}</div>
                   
                </template>
                
                <template if:true={ProvisioningBacklogscard5Error}>
                    <div class="error-state-dark">Failed to load Provisioning Backlogs % data.</div>
                </template>
            </div>

            

        </div>
    </div>
</template>
